<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Крестики-Нолики Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .grid-cell {
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            cursor: pointer;
            border: 2px solid #e2e8f0;
        }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

    <div class="bg-white p-8 rounded-lg shadow-xl w-full max-w-md">
        
        <section id="auth-section">
            <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Авторизация</h2>
            <form id="auth-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Имя пользователя</label>
                    <input type="text" id="username" required class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Пароль</label>
                    <input type="password" id="password" required class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm focus:ring-blue-500 focus:border-blue-500">
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700 transition">Войти</button>
            </form>
        </section>

        <section id="lobby-section" class="hidden">
            <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Меню игры</h2>
            
            <div class="space-y-8">
                <div class="p-4 border border-blue-100 bg-blue-50 rounded-md">
                    <h3 class="font-semibold mb-2 text-blue-800">Создать новую игру</h3>
                    <input type="text" id="new-game-name" placeholder="Название игры" class="w-full border p-2 rounded-md mb-2">
                    <button onclick="createGame()" class="w-full bg-blue-500 text-white py-2 rounded-md hover:bg-blue-600">Создать</button>
                </div>

                <div class="relative flex py-2 items-center">
                    <div class="flex-grow border-t border-gray-300"></div>
                    <span class="flex-shrink mx-4 text-gray-400">или</span>
                    <div class="flex-grow border-t border-gray-300"></div>
                </div>

                <div class="p-4 border border-green-100 bg-green-50 rounded-md">
                    <h3 class="font-semibold mb-2 text-green-800">Присоединиться по коду</h3>
                    <input type="text" id="game-code" placeholder="Код (ID) игры" class="w-full border p-2 rounded-md mb-2">
                    <button onclick="joinGame()" class="w-full bg-green-500 text-white py-2 rounded-md hover:bg-green-600">Войти в игру</button>
                </div>
            </div>
        </section>

        <section id="game-section" class="hidden">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-gray-800">Игра: <span id="display-game-name" class="text-blue-600">...</span></h2>
                <button onclick="leaveGame()" class="text-xs text-red-500 hover:underline">Выйти</button>
            </div>
            
            <div id="board" class="grid grid-cols-3 gap-2 mx-auto" style="width: 312px;">
                <div class="grid-cell hover:bg-gray-50" data-index="0"></div>
                <div class="grid-cell hover:bg-gray-50" data-index="1"></div>
                <div class="grid-cell hover:bg-gray-50" data-index="2"></div>
                <div class="grid-cell hover:bg-gray-50" data-index="3"></div>
                <div class="grid-cell hover:bg-gray-50" data-index="4"></div>
                <div class="grid-cell hover:bg-gray-50" data-index="5"></div>
                <div class="grid-cell hover:bg-gray-50" data-index="6"></div>
                <div class="grid-cell hover:bg-gray-50" data-index="7"></div>
                <div class="grid-cell hover:bg-gray-50" data-index="8"></div>
            </div>

            <div id="status" class="mt-6 text-center font-medium text-gray-600">
                Ожидание хода...
            </div>
        </section>

    </div>

    <script>
        const API_URL = ''; // Укажите URL сервера
        let accessToken = localStorage.getItem('token');
        let currentGame = null;
        let pollingInterval = null;

        // Инициализация при загрузке
        if (accessToken) {
            checkAuth();
        }

        /**
         * Универсальная обертка для API запросов
         */
        async function apiCall(endpoint, options = {}) {
            const url = `${API_URL}${endpoint}`;
            
            const headers = {
                'Content-Type': 'application/json',
                ...options.headers,
            };

            if (accessToken) {
                headers['Authorization'] = `Bearer ${accessToken}`;
            }

            try {
                const response = await fetch(url, { ...options, headers });

                // Если токен невалиден или протух
                if (response.status === 401 || response.status === 403) {
                    logout();
                    return null;
                }

                return response;
            } catch (error) {
                console.error(`Сетевая ошибка (${endpoint}):`, error);
                return null;
            }
        }

        async function checkAuth() {
            const response = await apiCall('/api/me');
            if (response && response.ok) {
                showSection('lobby-section');
                pollActiveGame();
            }
        }

        // --- 1. АВТОРИЗАЦИЯ ---
        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            const formData = new URLSearchParams();
            formData.append('username', username);
            formData.append('password', password);

            try {
                const response = await fetch(`${API_URL}/api/login/form`, {
                    method: 'POST',
                    body: formData,
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
                });

                const result = await response.json();
                if (response.ok) {
                    accessToken = result.access_token;
                    localStorage.setItem('token', accessToken);
                    showSection('lobby-section');
                    pollActiveGame();
                } else {
                    alert(result.detail || "Ошибка входа");
                }
            } catch (err) {
                alert("Ошибка соединения с сервером");
            }
        });

        // --- 2. ЛОББИ ---
        async function createGame() {
            const name = document.getElementById('new-game-name').value;
            const response = await apiCall('/api/game', {
                method: 'POST',
                body: JSON.stringify({ name: name })
            });

            if (response && response.ok) {
                const game = await response.json();
                renderGame(game);
            }
        }

        async function joinGame() {
            const gameId = parseInt(document.getElementById('game-code').value);
            const response = await apiCall('/api/game/join', {
                method: 'POST',
                body: JSON.stringify({ game_id: gameId })
            });

            if (response && response.ok) {
                const game = await response.json();
                renderGame(game);
            } else if (response) {
                const err = await response.json();
                alert(err.detail || "Ошибка подключения");
            }
        }

        // --- 3. ИГРОВОЙ ПРОЦЕСС ---
        async function makeMove(cellIndex) {
            const response = await apiCall('/api/game/turn', {
                method: 'POST',
                body: JSON.stringify({ number: cellIndex })
            });
            
            if (response && response.ok) {
                await fetchCurrentGame();
            }
        }

        async function fetchCurrentGame() {
            const response = await apiCall('/api/game');
            if (response && response.ok) {
                const game = await response.json();
                renderGame(game);
            }
        }

        function renderGame(game) {
            currentGame = game;
            showSection('game-section');
            document.getElementById('display-game-name').innerText = `${game.name} (ID: ${game.id})`;
            
            const cells = document.querySelectorAll('.grid-cell');
            cells.forEach(c => c.innerText = '');

            game.turns.forEach(turn => {
                if (cells[turn.number]) cells[turn.number].innerText = turn.simbol;
            });

            const statusEl = document.getElementById('status');
            if (!game.user_two) {
                statusEl.innerText = "Ожидание второго игрока...";
            } else {
                statusEl.innerText = "Игра идет";
            }
        }

        function pollActiveGame() {
            if (pollingInterval) clearInterval(pollingInterval);
            pollingInterval = setInterval(fetchCurrentGame, 2000);
        }

        function logout() {
            if (pollingInterval) {
                clearInterval(pollingInterval);
                pollingInterval = null;
            }
            localStorage.removeItem('token');
            accessToken = null;
            currentGame = null;
            
            // Очистка интерфейса
            const cells = document.querySelectorAll('.grid-cell');
            cells.forEach(c => c.innerText = '');
            
            showSection('auth-section');
        }

        function showSection(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        document.querySelectorAll('.grid-cell').forEach(cell => {
            cell.addEventListener('click', (e) => {
                const index = parseInt(e.target.dataset.index);
                makeMove(index);
            });
        });
    </script>
</body>
</html>
